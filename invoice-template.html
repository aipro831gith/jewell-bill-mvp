<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Template 1 Invoice</title>
    <link rel="stylesheet" href="./invoice-template.css" />
  </head>
  <body>
    <main id="invoice-root" aria-label="Template 1 invoice preview"></main>
    <template id="invoice-page-template">
      <section class="invoice-page">
        <div class="invoice-title">TAX INVOICE</div>
        <div class="copy-label"></div>
        <div class="seller-tax seller-gstin"></div>
        <div class="seller-tax seller-pan"></div>
        <div class="invoice-meta invoice-number"></div>
        <div class="invoice-meta invoice-date"></div>
        <img class="seller-logo" alt="Business logo" />
        <div class="seller-brand"></div>
        <div class="seller-address"></div>
        <div class="seller-contact"></div>
        <div class="seller-email"></div>
        <section class="buyer-box">
          <div class="buyer-title">BUYER DETAILS</div>
          <div class="buyer-left buyer-name"></div>
          <div class="buyer-left buyer-address"></div>
          <div class="buyer-left buyer-phone"></div>
          <div class="buyer-right buyer-gstin"></div>
          <div class="buyer-right buyer-id"></div>
          <div class="buyer-right buyer-state"></div>
          <div class="buyer-right buyer-state-code"></div>
        </section>
        <section class="items-table">
          <div class="items-header item-grid">
            <div>Serial<br />No</div><div>Description of Goods</div><div>HSN/SAC<br />Code</div>
            <div class="purity-heading">Purity</div><div>Weight<br />(Gm)</div><div>Rate/Gram<br />(₹)</div><div>Amount&nbsp;&nbsp;(₹)</div>
          </div>
          <div class="items-body"></div>
        </section>
        <section class="totals-box"></section>
        <div class="amount-words"></div>
        <section class="bank-box">
          <div class="payment-heading">PAYMENT MODE</div>
          <div class="bank-details"></div>
        </section>
        <div class="signature-for"></div>
        <div class="signature-label">AUTHORISED SIGNATORY</div>
        <div class="jurisdiction"></div>
        <div class="eoe">E&amp;OE</div>
      </section>
    </template>
    <script type="module">
      const money = (value) => Number(value).toLocaleString('en-IN', { maximumFractionDigits: 2, minimumFractionDigits: 0, useGrouping: false });
      const words = (value) => {
        const ones = ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten', 'Eleven', 'Twelve', 'Thirteen', 'Fourteen', 'Fifteen', 'Sixteen', 'Seventeen', 'Eighteen', 'Nineteen'];
        const tens = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
        const below100 = (n) => n < 20 ? ones[n] : `${tens[Math.floor(n / 10)]}${n % 10 ? ` ${ones[n % 10]}` : ''}`;
        const below1000 = (n) => n >= 100 ? `${ones[Math.floor(n / 100)]} Hundred${n % 100 ? ` ${below100(n % 100)}` : ''}` : below100(n);
        if (!value) return 'Rupees Zero Only';
        const parts = [[10000000, 'Crore'], [100000, 'Lakh'], [1000, 'Thousand']];
        let remaining = Math.floor(value); const out = [];
        parts.forEach(([unit, name]) => { const part = Math.floor(remaining / unit); if (part) { out.push(`${below1000(part)} ${name}`); remaining %= unit; } });
        if (remaining) out.push(below1000(remaining));
        return `Rupees ${out.join(' ')} Only`;
      };
      const row = (label, value, kind) => `<div class="total-row ${kind}"><span>${label}</span><strong>${money(value)}</strong></div>`;
      const load = async () => (await fetch('./invoice-data.json', { cache: 'no-store' })).json();
      const render = (data) => {
        const taxableBeforeDiscount = data.items.reduce((sum, item) => sum + Number(item.weight) * Number(item.rate), 0);
        const taxable = taxableBeforeDiscount - Number(data.discountAmount || 0);
        const isTaxInvoice = data.documentType === 'TAX INVOICE';
        const cgst = isTaxInvoice && data.taxMode === 'LOCAL' ? taxable * 0.015 : 0;
        const sgst = isTaxInvoice && data.taxMode === 'LOCAL' ? taxable * 0.015 : 0;
        const igst = isTaxInvoice && data.taxMode === 'INTERSTATE' ? taxable * 0.03 : 0;
        const rawTotal = taxable + cgst + sgst + igst;
        const grandTotal = Math.ceil(rawTotal);
        const roundOff = grandTotal - rawTotal;
        const source = document.getElementById('invoice-page-template');
        const root = document.getElementById('invoice-root');
        root.replaceChildren();
        data.copyLabels.forEach((copyLabel) => {
          const page = source.content.firstElementChild.cloneNode(true);
          page.classList.toggle('purity-off', !data.purityColumn);
          page.classList.toggle('has-discount', Number(data.discountAmount || 0) > 0);
          page.querySelector('.invoice-title').textContent = data.documentType;
          page.querySelector('.copy-label').textContent = copyLabel;
          page.querySelector('.seller-gstin').textContent = `GSTIN: ${data.seller.gstin}`;
          page.querySelector('.seller-pan').textContent = `PAN NO:${data.seller.pan}`;
          page.querySelector('.invoice-number').textContent = `INVOICE NO: ${data.invoice.number}`;
          page.querySelector('.invoice-date').textContent = `DATE: ${data.invoice.date}`;
          page.querySelector('.seller-logo').src = data.seller.logoUrl;
          page.querySelector('.seller-brand').textContent = data.seller.brandName;
          page.querySelector('.seller-address').textContent = data.seller.address;
          page.querySelector('.seller-contact').textContent = `CONTACT NO: ${data.seller.phone}`;
          page.querySelector('.seller-email').textContent = `EMAIL ID: ${data.seller.email}`;
          page.querySelector('.buyer-name').textContent = `NAME: ${data.customer.name}`;
          page.querySelector('.buyer-address').textContent = `ADDRESS: ${data.customer.address}`;
          page.querySelector('.buyer-phone').textContent = `CONTACT NO: ${data.customer.phone || 'NILL'}`;
          page.querySelector('.buyer-gstin').textContent = `GSTIN: ${data.customer.gstin || 'NILL'}`;
          page.querySelector('.buyer-id').textContent = `${data.customer.idType === 'AADHAAR' ? 'AADHAAR NO' : 'PAN NO'}: ${data.customer.idNumber || 'NILL'}`;
          page.querySelector('.buyer-state').textContent = `STATE: ${data.customer.state}`;
          page.querySelector('.buyer-state-code').textContent = `STATE CODE: ${data.customer.stateCode}`;
          const items = page.querySelector('.items-body');
          data.items.forEach((item, index) => {
            const itemRow = document.createElement('div'); itemRow.className = 'item-grid item-row';
            const amount = Number(item.weight) * Number(item.rate);
            itemRow.innerHTML = `<div>${index + 1}</div><div>${item.description}</div><div>${item.hsn}</div><div class="purity-cell">${item.purity || ''}</div><div>${money(item.weight)}</div><div>${money(item.rate)}</div><div>${money(amount)}</div>`;
            items.append(itemRow);
          });
          const totals = page.querySelector('.totals-box');
          if (Number(data.discountAmount || 0) > 0) { totals.insertAdjacentHTML('beforeend', row('SUBTOTAL :', taxableBeforeDiscount, 'total-amount') + row('LESS: DISCOUNT :', -Number(data.discountAmount), 'total-amount')); }
          totals.insertAdjacentHTML('beforeend', row('TOTAL AMOUNT :', taxable, 'total-amount') + row('CGST  1.5% :', cgst, 'tax') + row('SGST  1.5% :', sgst, 'tax') + row('IGST  3% :', igst, 'tax') + row('ROUND OFF :', roundOff, 'round') + row('GRAND TOTAL :', grandTotal, 'grand'));
          page.querySelector('.amount-words').textContent = `Amount in Words: ${words(grandTotal)}`;
          page.querySelector('.bank-details').innerHTML = [`BANK NAME: ${data.seller.bank.name}`, `BRANCH: ${data.seller.bank.branch}`, `ACCOUNT NAME: ${data.seller.bank.accountName}`, `ACCOUNT NO: ${data.seller.bank.accountNo}`, `IFSC CODE: ${data.seller.bank.ifsc}`].map((line) => `<div>${line}</div>`).join('');
          page.querySelector('.signature-for').textContent = `FOR ${data.seller.brandName}`;
          page.querySelector('.jurisdiction').textContent = `SUBJECT TO ${data.seller.jurisdiction} JURISDICTION`;
          root.append(page);
        });
      };
      load().then(render).catch((error) => { document.body.textContent = `Unable to load invoice data: ${error.message}`; });
    </script>
  </body>
</html>
